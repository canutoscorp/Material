<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canuto's Wings</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f10;color:white}
.container{max-width:520px;margin:auto;padding:15px}
.card{background:#1a1a1f;border-radius:18px;padding:15px;margin-bottom:15px}
img{width:100%;border-radius:14px;margin-bottom:10px}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#ff7a00;color:white;font-size:16px;font-weight:bold;margin-top:10px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:10px;border:none}

.item{margin-bottom:10px;padding:10px;background:#141418;border-radius:10px}
</style>
</head>

<body>

<div class="container">

<h2>🍗 Canuto's Wings</h2>

<div class="card">
<img src="https://raw.githubusercontent.com/canutoscorp/Material/main/combo.jpg">
<h3>Combo $20</h3>
<button onclick="addItem('Combo con Papas',20,6,'1 papas + 1 refresco')">Agregar</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/canutoscorp/Material/main/combo.jpg">
<h3>Orden clásica $15</h3>
<button onclick="addItem('Orden clásica',15,6,'1 refresco')">Agregar</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/canutoscorp/Material/main/combo.jpg">
<h3>Alitas individuales</h3>
<select id="indCount">
<option value="6">6 alitas</option>
<option value="10">10 alitas</option>
<option value="12">12 alitas</option>
</select>
<button onclick="addIndividual()">Agregar</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/canutoscorp/Material/main/papas.jpg">
<h3>Papas $6</h3>
<button onclick="addExtra('Papas',6)">Agregar</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/canutoscorp/Material/main/soda.jpg">
<h3>Soda $2</h3>
<button onclick="addExtra('Soda',2)">Agregar</button>
</div>

<div class="card">
<h3>Datos del cliente (opcional)</h3>
<input id="nombre" placeholder="Nombre">
<input id="hora" placeholder="Hora">
<select id="pago">
<option>Efectivo</option>
<option>Cash App</option>
<option>Zelle</option>
</select>
</div>

<div class="card">
<h3>Carrito</h3>
<div id="cart"></div>
<button onclick="enviar()">Enviar por WhatsApp</button>
</div>

</div>

<script>

let cart=[];

function addItem(nombre,precio,alitas,includes){
cart.push({
nombre,
precio,
alitas,
includes,
sabor:"BBQ"
});
render();
}

function addIndividual(){
let c=document.getElementById("indCount").value;
cart.push({
nombre:"Alitas individuales",
precio:c*3,
alitas:c,
includes:"Solo alitas",
sabor:"Mix"
});
render();
}

function addExtra(nombre,precio){
cart.push({
nombre,
precio,
alitas:0,
includes:"Extra"
});
render();
}

function render(){
let html="";
cart.forEach((item,i)=>{
html+=`
<div class="item">
${i+1}. ${item.nombre} - $${item.precio}
</div>
`;
});
document.getElementById("cart").innerHTML=html;
}

function enviar(){

if(cart.length==0){
alert("Agrega productos");
return;
}

let nombre=document.getElementById("nombre").value;
let hora=document.getElementById("hora").value;
let pago=document.getElementById("pago").value;

let total=0;
let totalAlitas=0;

let lines=[];

lines.push("🍗 *CANUTO'S WINGS*");
lines.push("");

if(nombre) lines.push("Cliente: "+nombre);
if(hora) lines.push("Hora: "+hora);

lines.push("Pago: "+pago);
lines.push("");

lines.push("──────────────");
lines.push("");

cart.forEach((item,i)=>{

lines.push(`${i+1}. ${item.nombre}  $${item.precio}`);

if(item.alitas>0){
lines.push("• Alitas: "+item.alitas);
lines.push("• Incluye: "+item.includes);
lines.push("• Sabor: "+item.sabor);
totalAlitas+=parseInt(item.alitas);
}else{
lines.push("• "+item.includes);
}

lines.push("");
total+=item.precio;

});

lines.push("──────────────");
lines.push("Total alitas: "+totalAlitas);
lines.push("TOTAL: $"+total);
lines.push("");
lines.push("Gracias 🙌");

// ✅ CORRECTO (YA ARREGLADO)
let texto=lines.join("\n");

window.open("https://wa.me/12515004300?text="+encodeURIComponent(texto));

}

</script>

</body>
</html>
